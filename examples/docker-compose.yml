# docker-compose.yml — Microservices Example
# -----------------------------------------------
# Demonstrates a simple microservices setup:
#   - API Gateway (nginx)
#   - User Service (Node.js)
#   - Product Service (Node.js)
#   - PostgreSQL databases (one per service)
#   - Redis (shared cache)
#
# Usage:
#   docker compose up --build
#   docker compose down -v   # also removes volumes

version: "3.9"

services:

  # ── API Gateway ──────────────────────────────
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
    networks:
      - frontend

  # ── User Service ─────────────────────────────
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://user_svc:secret@user-db:5432/users
      REDIS_URL: redis://cache:6379
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - frontend
      - user-net

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: users
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_svc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user-net

  # ── Product Service ───────────────────────────
  product-service:
    build:
      context: ./services/product
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://prod_svc:secret@product-db:5432/products
      REDIS_URL: redis://cache:6379
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - frontend
      - product-net

  product-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: prod_svc
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: products
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod_svc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - product-net

  # ── Shared Cache ──────────────────────────────
  cache:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - frontend

# ── Volumes ────────────────────────────────────
volumes:
  user_db_data:
  product_db_data:
  redis_data:

# ── Networks ───────────────────────────────────
networks:
  frontend:        # Gateway ↔ Services
  user-net:        # User Service ↔ User DB (isolated)
  product-net:     # Product Service ↔ Product DB (isolated)
